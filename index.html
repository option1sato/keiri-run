<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>はしれ！経理さん！</title>
<!-- LIFF SDK -->
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<!-- React + Babel (JSX in browser) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#eef4ff; font-family:'Noto Sans JP',sans-serif; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>

<script>
const {
  useState,
  useEffect,
  useRef,
  useCallback
} = React;

// ============================================================
// CONFIG
// ============================================================
// ★ 以下の2つを実際の値に変更してください
const RENDER_BASE_URL = 'https://line-webhook-xxxx.onrender.com'; // RenderサーバーのURL
const LIFF_ID = '1657887190-r3uON8GQ'; // LIFF ID

// ============================================================
// LIFF & API HELPERS
// ============================================================
let liffProfile = null; // { userId, displayName }

async function initLiff() {
  try {
    if (typeof liff !== 'undefined') {
      await liff.init({
        liffId: LIFF_ID
      });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        liffProfile = {
          userId: profile.userId,
          displayName: profile.displayName
        };
      } else {
        // LINEブラウザ以外ではログイン不要（名前は手入力）
        liffProfile = null;
      }
    }
  } catch (e) {
    console.warn('LIFF init failed:', e);
    liffProfile = null;
  }
}
async function loadPlayerName() {
  if (liffProfile?.displayName) return liffProfile.displayName;
  return localStorage.getItem('keiri_player_name') || '';
}
async function savePlayerName(name) {
  localStorage.setItem('keiri_player_name', name);
}
async function loadScores() {
  // ランキングパネル表示用にAPIから取得（filterByPeriodを通さず直接返す）
  return [];
}
async function loadRanking(period) {
  try {
    const res = await fetch(`${RENDER_BASE_URL}/api/ranking?period=${period}`);
    const data = await res.json();
    return data.ok ? data.scores : [];
  } catch (e) {
    console.error('loadRanking error:', e);
    return [];
  }
}
async function saveScore(entry) {
  try {
    await fetch(`${RENDER_BASE_URL}/api/ranking`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        name: entry.name,
        score: entry.score,
        collected: entry.collected,
        period: entry.period || 'daily',
        lineUserId: liffProfile?.userId || ''
      })
    });
    // マンスリーにも同時登録
    if (!entry.period || entry.period === 'daily') {
      await fetch(`${RENDER_BASE_URL}/api/ranking`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          name: entry.name,
          score: entry.score,
          collected: entry.collected,
          period: 'monthly',
          lineUserId: liffProfile?.userId || ''
        })
      });
    }
  } catch (e) {
    console.error('saveScore error:', e);
  }
}
function filterByPeriod(scores, period) {
  // APIから直接取得するので、このフィルタは使わない
  const now = Date.now();
  const ms = {
    daily: 86400000,
    monthly: 2592000000
  };
  return scores.filter(s => now - s.ts < ms[period]).sort((a, b) => b.score - a.score).slice(0, 10);
}

// ============================================================
// GAME CONSTANTS
// ============================================================
const CW = 720,
  CH = 420;
const GROUND = CH - 40;
const GRAVITY = 0.72,
  JUMP_FORCE = -15.5;
const BASE_SPEED = 4.2;

// ============================================================
// GAME ENGINE HOOK
// ============================================================
function useGame(canvasRef, onDie) {
  const stateRef = useRef({
    running: false,
    score: 0,
    collected: 0,
    frame: 0,
    speedMult: 1,
    speed: BASE_SPEED,
    keiri: {
      x: 88,
      y: GROUND,
      w: 34,
      h: 66,
      vy: 0,
      onGround: true,
      ducking: false,
      legPhase: 0,
      jumpCount: 0,
      blinkTimer: 0,
      blinking: false
    },
    obstacles: [],
    receipts: [],
    particles: [],
    groundX: 0,
    flashAlpha: 0,
    nextObstDist: 300,
    nextReceiptDist: 160,
    clouds: Array.from({
      length: 5
    }, (_, i) => ({
      x: i * 160,
      y: 10 + Math.random() * 40,
      w: 50 + Math.random() * 55,
      sp: 0.2 + Math.random() * 0.22
    })),
    animId: null
  });
  const scoreRef = useRef(0);
  const collectedRef = useRef(0);
  const jump = useCallback(() => {
    const k = stateRef.current.keiri;
    if (k.jumpCount < 2) {
      k.vy = JUMP_FORCE;
      k.onGround = false;
      k.jumpCount++;
    }
  }, []);
  const duck = useCallback(on => {
    const k = stateRef.current.keiri;
    k.ducking = on;
    k.h = on ? 38 : 66;
  }, []);
  const reset = useCallback(() => {
    const s = stateRef.current;
    s.score = 0;
    s.collected = 0;
    s.frame = 0;
    s.speedMult = 1;
    s.speed = BASE_SPEED;
    s.obstacles = [];
    s.receipts = [];
    s.particles = [];
    s.flashAlpha = 0;
    s.nextObstDist = 300;
    s.nextReceiptDist = 160;
    s.groundX = 0;
    const k = s.keiri;
    k.x = 88;
    k.y = GROUND;
    k.vy = 0;
    k.onGround = true;
    k.ducking = false;
    k.h = 66;
    k.jumpCount = 0;
    k.legPhase = 0;
    k.blinkTimer = 0;
    k.blinking = false;
    scoreRef.current = 0;
    collectedRef.current = 0;
    s.running = true;
  }, []);

  // ── obstacle types ──
  const OBS_TYPES = [{
    id: 'cone',
    w: 28,
    h: 38,
    ground: true,
    draw(ctx, x, y, h) {
      ctx.fillStyle = '#ff6b00';
      ctx.beginPath();
      ctx.moveTo(x + 14, y - h);
      ctx.lineTo(x + 28, y);
      ctx.lineTo(x, y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(x + 8, y - h * 0.35);
      ctx.lineTo(x + 20, y - h * 0.35);
      ctx.lineTo(x + 22, y - h * 0.22);
      ctx.lineTo(x + 6, y - h * 0.22);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x + 5, y - h * 0.62);
      ctx.lineTo(x + 23, y - h * 0.62);
      ctx.lineTo(x + 21, y - h * 0.49);
      ctx.lineTo(x + 7, y - h * 0.49);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#e05500';
      ctx.beginPath();
      ctx.roundRect(x - 3, y - 5, 34, 7, 2);
      ctx.fill();
    }
  }, {
    id: 'box',
    w: 36,
    h: 36,
    ground: true,
    draw(ctx, x, y, h) {
      ctx.fillStyle = '#c8883a';
      ctx.beginPath();
      ctx.roundRect(x, y - h, 36, h, 3);
      ctx.fill();
      ctx.fillStyle = '#a0662a';
      ctx.beginPath();
      ctx.roundRect(x, y - h, 36, 6, 3);
      ctx.fill();
      ctx.fillStyle = '#e8a84a';
      ctx.fillRect(x + 16, y - h, 4, h);
      ctx.fillRect(x, y - h / 2 - 2, 36, 4);
      ctx.fillStyle = '#8b4513';
      ctx.font = 'bold 6px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('FRAGILE', x + 18, y - h + 28);
    }
  }, {
    id: 'bird',
    w: 44,
    h: 48,
    ground: false,
    yOff: 58,
    wingPhase: 0,
    draw(ctx, x, y, h, o) {
      o.wingPhase = (o.wingPhase || 0) + 0.18;
      const wy = Math.sin(o.wingPhase) * 8;
      ctx.fillStyle = '#5a7fd4';
      ctx.beginPath();
      ctx.ellipse(x + 18, y, 14, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a5fb0';
      ctx.beginPath();
      ctx.moveTo(x + 8, y);
      ctx.quadraticCurveTo(x, y - 8 + wy, x - 4, y - 2 + wy);
      ctx.quadraticCurveTo(x + 4, y + 2, x + 8, y);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x + 28, y);
      ctx.quadraticCurveTo(x + 36, y - 8 + wy, x + 40, y - 2 + wy);
      ctx.quadraticCurveTo(x + 32, y + 2, x + 28, y);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(x + 32, y - 1);
      ctx.lineTo(x + 38, y + 1);
      ctx.lineTo(x + 32, y + 3);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x + 26, y - 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(x + 27, y - 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }];
  const spawnObstacle = s => {
    const t = OBS_TYPES[Math.floor(Math.random() * OBS_TYPES.length)];
    const yOff = t.ground ? 0 : t.yOff || 50;
    const o = {
      ...t,
      x: CW + 20,
      y: GROUND - yOff,
      wingPhase: 0
    };
    s.obstacles.push(o);
    if (t.id === 'cone' && s.speedMult > 1.4 && Math.random() < 0.25) s.obstacles.push({
      ...t,
      x: CW + 20 + t.w + 14,
      y: GROUND - yOff,
      wingPhase: 0
    });
  };
  const spawnReceipt = s => {
    const yVars = [0, 28, 54];
    const yOff = yVars[Math.floor(Math.random() * yVars.length)];
    s.receipts.push({
      x: CW + 10,
      y: GROUND - 8 - yOff,
      r: 12,
      collected: false,
      pulse: Math.random() * Math.PI * 2
    });
  };
  const emitCollect = (s, x, y) => {
    for (let i = 0; i < 10; i++) {
      const a = i / 10 * Math.PI * 2;
      s.particles.push({
        x,
        y,
        vx: Math.cos(a) * 2.8,
        vy: Math.sin(a) * 2.8 - 0.5,
        life: 36,
        maxLife: 36,
        isText: false
      });
    }
    s.particles.push({
      x,
      y: y - 8,
      vx: 0,
      vy: -1.3,
      life: 45,
      maxLife: 45,
      isText: true,
      text: '+1pt'
    });
  };
  const collidesObs = (k, o) => {
    const pad = 8;
    const ax1 = k.x + pad,
      ax2 = k.x + k.w - pad;
    const ay1 = k.y - k.h + (k.ducking ? 14 : 0) + pad,
      ay2 = k.y - pad;
    const by1 = o.id === 'bird' ? o.y - o.h / 2 : o.y - o.h;
    const by2 = o.id === 'bird' ? o.y + o.h / 2 : o.y;
    return ax1 < o.x + o.w - 4 && ax2 > o.x + 4 && ay1 < by2 && ay2 > by1;
  };

  // ── DRAW ──
  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const s = stateRef.current;
    const k = s.keiri;
    ctx.clearRect(0, 0, CW, CH);

    // BG
    const grd = ctx.createLinearGradient(0, 0, 0, GROUND);
    grd.addColorStop(0, '#cddcff');
    grd.addColorStop(1, '#eef4ff');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, CW, CH);
    for (const c of s.clouds) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.ellipse(c.x + c.w / 2, c.y, c.w / 2, 13, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x + c.w * 0.3, c.y + 5, c.w * 0.28, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(c.x + c.w * 0.7, c.y + 5, c.w * 0.28, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Ground
    const g2 = ctx.createLinearGradient(0, GROUND, 0, CH);
    g2.addColorStop(0, '#285ac8');
    g2.addColorStop(1, '#1a3a8a');
    ctx.fillStyle = g2;
    ctx.fillRect(0, GROUND, CW, CH - GROUND);
    ctx.strokeStyle = 'rgba(115,165,255,0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 14; i++) {
      const x = (s.groundX + i * 58) % (CW + 58) - 58;
      ctx.beginPath();
      ctx.moveTo(x, GROUND);
      ctx.lineTo(x + 36, GROUND);
      ctx.stroke();
    }

    // Receipts
    for (const r of s.receipts) {
      if (r.collected) continue;
      r.pulse += 0.09;
      const glow = 12 + Math.sin(r.pulse) * 5;
      ctx.save();
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = glow + 8;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.roundRect(r.x - r.r, r.y - r.r * 1.5, r.r * 2, r.r * 3, 3);
      ctx.fill();
      ctx.shadowColor = 'rgba(200,220,255,0.9)';
      ctx.shadowBlur = glow;
      ctx.strokeStyle = 'rgba(180,210,255,0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(180,200,240,0.6)';
      ctx.lineWidth = 1;
      for (let i = 1; i <= 3; i++) {
        ctx.beginPath();
        ctx.moveTo(r.x - r.r + 3, r.y - r.r * 1.5 + i * 8);
        ctx.lineTo(r.x + r.r - 3, r.y - r.r * 1.5 + i * 8);
        ctx.stroke();
      }
      ctx.fillStyle = '#73a5ff';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('領', r.x, r.y + 4);
      ctx.restore();
    }

    // Obstacles
    for (const o of s.obstacles) {
      ctx.save();
      o.draw(ctx, o.x, o.y, o.h, o);
      ctx.restore();
    }

    // Character
    drawCharacter(ctx, k, s.frame);

    // Particles
    for (const p of s.particles) {
      ctx.globalAlpha = p.life / p.maxLife;
      if (p.isText) {
        ctx.fillStyle = '#285ac8';
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.fillStyle = '#b0d0ff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;

    // HUD
    ctx.fillStyle = 'rgba(40,90,200,0.10)';
    ctx.beginPath();
    ctx.roundRect(CW - 152, 4, 148, 24, 4);
    ctx.fill();
    ctx.fillStyle = '#285ac8';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(String(Math.floor(s.score)).padStart(6, '0') + ' pt', CW - 8, 21);

    // Flash
    if (s.flashAlpha > 0) {
      ctx.fillStyle = `rgba(232,64,64,${s.flashAlpha})`;
      ctx.fillRect(0, 0, CW, CH);
    }
  }, [canvasRef]);

  // ── UPDATE ──
  const update = useCallback(() => {
    const s = stateRef.current;
    if (!s.running) return;
    const k = s.keiri;
    s.frame++;
    s.score += 0.15 * s.speedMult;
    s.speedMult = 1 + Math.floor(s.score / 500) * 0.1;
    if (s.speedMult > 2.5) s.speedMult = 2.5;
    s.speed = BASE_SPEED * s.speedMult;
    scoreRef.current = Math.floor(s.score);
    k.vy += GRAVITY;
    k.y += k.vy;
    if (k.y >= GROUND) {
      k.y = GROUND;
      k.vy = 0;
      k.onGround = true;
      k.jumpCount = 0;
    }
    if (k.onGround && !k.ducking) k.legPhase += s.speed * 0.75;
    k.blinkTimer++;
    if (k.blinkTimer > 110) k.blinking = true;
    if (k.blinkTimer > 117) {
      k.blinking = false;
      k.blinkTimer = 0;
    }
    s.groundX -= s.speed;
    for (const c of s.clouds) {
      c.x -= c.sp;
      if (c.x + c.w < 0) c.x = CW + 10;
    }
    s.nextReceiptDist -= s.speed;
    if (s.nextReceiptDist <= 0) {
      spawnReceipt(s);
      s.nextReceiptDist = 90 + Math.random() * 130;
    }
    for (let i = s.receipts.length - 1; i >= 0; i--) {
      const r = s.receipts[i];
      r.x -= s.speed;
      if (r.x < -20) {
        s.receipts.splice(i, 1);
        continue;
      }
      if (!r.collected && r.x + r.r > k.x && r.x - r.r < k.x + k.w && r.y + r.r * 1.5 > k.y - k.h && r.y - r.r * 1.5 < k.y) {
        r.collected = true;
        s.collected++;
        s.score += 1;
        collectedRef.current = s.collected;
        emitCollect(s, r.x, r.y);
      }
    }
    s.nextObstDist -= s.speed;
    if (s.nextObstDist <= 0) {
      spawnObstacle(s);
      s.nextObstDist = 200 + Math.random() * 270 / s.speedMult;
    }
    for (let i = s.obstacles.length - 1; i >= 0; i--) {
      const o = s.obstacles[i];
      o.x -= s.speed;
      if (o.x + o.w < -50) {
        s.obstacles.splice(i, 1);
        continue;
      }
      if (collidesObs(k, o)) {
        s.running = false;
        s.flashAlpha = 0.55;
        onDie(Math.floor(s.score), s.collected);
        return;
      }
    }
    for (let i = s.particles.length - 1; i >= 0; i--) {
      const p = s.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.life--;
      if (p.life <= 0) s.particles.splice(i, 1);
    }
    if (s.flashAlpha > 0) s.flashAlpha -= 0.05;
  }, [onDie]);
  const loop = useCallback(() => {
    update();
    draw();
    stateRef.current.animId = requestAnimationFrame(loop);
  }, [update, draw]);
  useEffect(() => {
    stateRef.current.animId = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(stateRef.current.animId);
  }, [loop]);
  return {
    jump,
    duck,
    reset,
    scoreRef,
    collectedRef
  };
}

// ── Draw character (standalone function) ──
// ============================================================
// CHARACTER SPRITES  run:168x230  jump:187x230  duck:164x140
// ============================================================

function drawCharacter(ctx, k, frame) {
  const kx = k.x;
  const ky = k.y;
  ctx.save();
  if (k.ducking) {
    if (!KEIRI_DUCK_IMG.complete || !KEIRI_DUCK_IMG.naturalWidth) {
      ctx.restore();
      return;
    }
    // duck: 108x130 (ratio 0.831)
    const dh = k.h + 10;
    const dw = dh * (108 / 130);
    const bob = Math.sin(frame * 0.18) * 1.0;
    ctx.drawImage(KEIRI_DUCK_IMG, kx, ky - dh + bob, dw, dh);
  } else if (!k.onGround) {
    if (!KEIRI_JUMP_IMG.complete || !KEIRI_JUMP_IMG.naturalWidth) {
      ctx.restore();
      return;
    }
    // jump: 240x220 (ratio 1.091)
    const jh = k.h;
    const jw = jh * (240 / 220);
    const tilt = k.vy < 0 ? -0.10 : 0.08;
    const scaleY = k.vy < 0 ? 1.05 : 0.97;
    ctx.translate(kx + jw * 0.5, ky);
    ctx.rotate(tilt);
    ctx.scale(1, scaleY);
    ctx.drawImage(KEIRI_JUMP_IMG, -jw * 0.5, -jh, jw, jh);
  } else {
    if (!KEIRI_RUN_IMG.complete || !KEIRI_RUN_IMG.naturalWidth) {
      ctx.restore();
      return;
    }
    // run: 190x220 (ratio 0.864)
    const rh = k.h;
    const rw = rh * (190 / 220);
    const bob = Math.sin(frame * 0.30) * 2.2;
    const tilt = Math.sin(frame * 0.28) * 0.035;
    ctx.translate(kx + rw * 0.5, ky + bob);
    ctx.rotate(tilt);
    ctx.drawImage(KEIRI_RUN_IMG, -rw * 0.5, -rh, rw, rh);

    // スピード線
    const la = 0.18 + Math.abs(Math.sin(frame * 0.4)) * 0.10;
    ctx.globalAlpha = la;
    ctx.strokeStyle = '#73a5ff';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    const ll = 12 + Math.abs(Math.sin(frame * 0.5)) * 5;
    [[-rw * 0.65, -rh * 0.44], [-rw * 0.72, -rh * 0.62], [-rw * 0.60, -rh * 0.78]].forEach(([lx, ly]) => {
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx - ll, ly);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

// ランキング順位を取得（全期間の中で最も良い順位を返す）
async function getRankAfterSave(score) {
  let bestRank = null;
  let bestPeriod = null;
  for (const p of ['daily', 'monthly']) {
    const ranked = await loadRanking(p);
    const idx = ranked.findIndex(s => s.score <= score);
    const rank = idx === -1 ? ranked.length + 1 : idx + 1;
    if (rank <= 3 && (bestRank === null || rank < bestRank)) {
      bestRank = rank;
      bestPeriod = p;
    }
  }
  return {
    rank: bestRank,
    period: bestPeriod
  };
}
